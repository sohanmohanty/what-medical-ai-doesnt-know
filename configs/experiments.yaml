experiment:
  name: core_missingness_grid
  datasets: [wdbc, statlog_heart]
  models: [logistic_regression, random_forest, gradient_boosting]
  imputers: [simple, simple_plus_indicators, knn, iterative]

  cv:
    protocol: repeated_stratified_k_fold
    outer_folds: 5
    repeats: 5
    stratified: true
    hyperparameter_tuning: true
    inner_folds: 3
    tuning_metric: roc_auc
    tuning_n_jobs: 1

  missingness:
    mechanisms: [mcar, mar, mnar]
    rates: [0.1, 0.2, 0.3, 0.5]
    random_seeds: [0, 1, 2, 3, 4]

  train_test_regimes:
    - clean_train_corrupt_test
    - corrupt_train_corrupt_test

  evaluation:
    metrics: [accuracy, roc_auc, brier, ece]
    save_probabilities: true
    save_masks: true
    calibration_bins: 10

  outputs:
    metrics_path: results/metrics/core_missingness_grid_metrics.csv
    summary_path: results/metrics/core_missingness_grid_summary.csv
    predictions_path: results/predictions/core_missingness_grid_predictions.csv
    manifest_path: results/manifests/core_missingness_grid_run_manifest.json
    masks_dir: results/masks/core_missingness_grid
    figures_dir: figures/runs/core_missingness_grid
