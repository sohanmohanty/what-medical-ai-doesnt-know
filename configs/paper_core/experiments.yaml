experiment:
  name: paper_core
  datasets: [wdbc, statlog_heart]
  models: [logistic_regression, random_forest, gradient_boosting]
  imputers: [simple]

  cv:
    protocol: repeated_stratified_k_fold
    outer_folds: 5
    repeats: 2
    stratified: true
    hyperparameter_tuning: true
    inner_folds: 3
    tuning_metric: roc_auc
    tuning_n_jobs: 1

  missingness:
    mechanisms: [mcar, mar, mnar]
    rates: [0.1, 0.2, 0.3, 0.5]
    random_seeds: [0]

  train_test_regimes:
    - clean_train_corrupt_test

  evaluation:
    metrics: [accuracy, roc_auc, brier, ece]
    save_probabilities: true
    save_masks: true
    calibration_bins: 10

  outputs:
    metrics_path: results/metrics/paper_core_metrics.csv
    summary_path: results/metrics/paper_core_summary.csv
    predictions_path: results/predictions/paper_core_predictions.csv
    manifest_path: results/manifests/paper_core_run_manifest.json
    masks_dir: results/masks/paper_core
    figures_dir: figures/runs/paper_core
